name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '3.4', '4.0']
        importmap-rails: ['2.1', '2.2']
        exclude:
          - ruby: '4.0'
            importmap-rails: '2.1'
    env:
      IMPORTMAP_RAILS_VERSION: ${{ matrix.importmap-rails }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test
